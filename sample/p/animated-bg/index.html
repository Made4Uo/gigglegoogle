<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animated Gradient Background — HTMLSnip</title>

    <link
      rel="alternate"
      type="application/json+oembed"
      href="https://Made4Uo/gigglegoogle/sample/oembed/animated-bg.json"
      title="Animated Gradient Background"
    />

    <meta property="og:title" content="Animated Gradient Background" />
    <meta
      property="og:description"
      content="A smooth animated gradient background built with pure CSS. Embed it in Canva for free."
    />
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://Made4Uo/gigglegoogle/sample/p/animated-bg/"
    />
    <meta name="twitter:card" content="player" />
    <meta
      name="twitter:player"
      content="https://YOUR_USERNAME.github.io/htmlsnip/p/animated-bg/"
    />
    <meta name="twitter:player:width" content="800" />
    <meta name="twitter:player:height" content="400" />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
        background-size: 400% 400%;
        animation: gradient 8s ease infinite;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      @keyframes gradient {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }
      .content {
        text-align: center;
        color: rgba(255, 255, 255, 0.92);
      }
      h1 {
        font-size: 2.5rem;
        font-weight: 700;
        letter-spacing: -0.5px;
        margin-bottom: 0.5rem;
        text-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
      }
      p {
        font-size: 1.1rem;
        opacity: 0.85;
      }
    </style>
  </head>
  <body>
    <div class="content">
      <h1>Your headline here</h1>
      <p>Subtitle or tagline goes here</p>
    </div>
  </body>
</html>
