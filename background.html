<style>
  .card { position: relative; width: 300px; height: 200px; cursor: pointer; }
  .card-base { 
    width: 100%; height: 100%; background: #6366f1; 
    border-radius: 12px; display: flex; align-items: center; 
    justify-content: center; color: white; font-size: 18px;
    font-family: sans-serif;
  }
  .card-hover {
    position: absolute; inset: 0; background: rgba(0,0,0,0.75);
    border-radius: 12px; display: flex; align-items: center;
    justify-content: center; color: white; font-family: sans-serif;
    opacity: 0; transition: opacity 0.3s ease;
  }
  .card:hover .card-hover { opacity: 1; }
</style>

<div class="card">
  <div class="card-base">Hover over me</div>
  <div class="card-hover">Hidden content revealed!</div>
</div>
